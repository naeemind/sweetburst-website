<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Summary</title>

<link rel="stylesheet" href="css/style.css">

<style>

.summary-container{
max-width:700px;
margin:auto;
margin-top:40px;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

.order-table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

.order-table th,
.order-table td{
padding:10px;
border-bottom:1px solid #ddd;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff4d4d;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">SweetBurst</div>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Product</a>
<a href="checkout.html">Checkout</a>
</nav>

</header>

<section class="summary-container">

<h1>🎉 Order Confirmed</h1>

<p>Thank you for supporting <b>Fuel a Student</b>.</p>

<table class="order-table">

<tr>
<th>Flavor</th>
<th>Quantity</th>
</tr>

<tr>
<td>Strawberry Yogurt</td>
<td id="strawberryQty">0</td>
</tr>

<tr>
<td>Mango Yogurt</td>
<td id="mangoQty">0</td>
</tr>

<tr>
<td>Blueberry Yogurt</td>
<td id="blueberryQty">0</td>
</tr>
<tr>
<td><b>Total Quantity</b></td>
<td id="totalQty"><b>0</b></td>
</tr>
</table>

<br>

<p>Quantity: <span id="quantity"></span></p>
<p>Subtotal: $<span id="subtotal"></span></p>
<p>Tax: $<span id="tax"></span></p>
<p>Total Paid: $<span id="total"></span></p>

<br>

<a href="index.html" class="cta">Return Home</a>

</section>

<script>

const params = new URLSearchParams(window.location.search);

const strawberry = parseInt(params.get("strawberry")) || 0;
const mango = parseInt(params.get("mango")) || 0;
const blueberry = parseInt(params.get("blueberry")) || 0;

const subtotal = params.get("subtotal") || "0.00";
const tax = params.get("tax") || "0.00";
const total = params.get("total") || "0.00";

document.getElementById("strawberryQty").textContent = strawberry;
document.getElementById("mangoQty").textContent = mango;
document.getElementById("blueberryQty").textContent = blueberry;

const totalQty = strawberry + mango + blueberry;

document.getElementById("totalQty").textContent = totalQty;

document.getElementById("subtotal").textContent = subtotal;
document.getElementById("tax").textContent = tax;
document.getElementById("total").textContent = total;

</script>
</body>
</html>
