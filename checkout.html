<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SweetBurst Checkout</title>

<link rel="stylesheet" href="css/style.css">

<style>

.checkout-container{
max-width:600px;
margin:auto;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.summary{
margin-top:20px;
background:#fff4f2;
padding:20px;
border-radius:10px;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff4d4d;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

.success{
display:none;
margin-top:20px;
background:#e6ffe6;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<header class="navbar">
<div class="logo">SweetBurst</div>
</header>

<section class="checkout-container">

<h1>Checkout</h1>

<form id="checkoutForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" id="address" required>
</div>

<div class="form-group">
<label>State</label>
<select id="state">
<option value="TX">Texas</option>
<option value="CA">California</option>
<option value="NY">New York</option>
<option value="IL">Illinois</option>
</select>
</div>

<div class="form-group">
<label>Quantity</label>
<input type="number" id="quantity" value="1" min="1">
</div>

<div class="summary">

<p>Price per bar: $1.79</p>

<p>Subtotal: <span id="subtotal">$1.79</span></p>

<p>Tax: <span id="tax">$0.15</span></p>

<p class="total">Total: <span id="total">$1.94</span></p>

</div>

<br>

<button type="submit">Place Order</button>

</form>

<div class="success" id="successMessage">
✅ Order placed successfully!  
Thank you for supporting **Fuel a Student**.
</div>

</section>


<script>

const price = 1.79

const taxRates = {
TX:0.0825,
CA:0.0725,
NY:0.04,
IL:0.0625
}

function calculate(){

let qty = document.getElementById("quantity").value
let state = document.getElementById("state").value

let subtotal = qty * price
let tax = subtotal * taxRates[state]
let total = subtotal + tax

document.getElementById("subtotal").innerText = "$" + subtotal.toFixed(2)
document.getElementById("tax").innerText = "$" + tax.toFixed(2)
document.getElementById("total").innerText = "$" + total.toFixed(2)

}

document.getElementById("quantity").addEventListener("input", calculate)
document.getElementById("state").addEventListener("change", calculate)

document.getElementById("checkoutForm").addEventListener("submit", function(e){

e.preventDefault()

document.getElementById("successMessage").style.display="block"

})

calculate()

</script>

</body>
</html>
