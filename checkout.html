<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SweetBurst Checkout</title>

<link rel="stylesheet" href="css/style.css">

<style>

.checkout-container{
max-width:700px;
margin:auto;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.summary{
margin-top:25px;
padding:20px;
background:#fff4f2;
border-radius:10px;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff4d4d;
}

</style>

<script>

const pricePerUnit = 1.79

const taxRates = {
"TX": 0.0825,
"CA": 0.0725,
"NY": 0.04,
"IL": 0.0625
}

function calculateTotal(){

let qty = document.getElementById("quantity").value
let state = document.getElementById("state").value

let subtotal = qty * pricePerUnit

let taxRate = taxRates[state] || 0

let tax = subtotal * taxRate

let total = subtotal + tax

document.getElementById("subtotal").innerText = "$" + subtotal.toFixed(2)
document.getElementById("tax").innerText = "$" + tax.toFixed(2)
document.getElementById("total").innerText = "$" + total.toFixed(2)

}

</script>

</head>

<body>

<header class="navbar">

<div class="logo">SweetBurst</div>

<nav>
<a href="index.html">Home</a>
<a href="product.html">Product</a>
<a href="checkout.html">Checkout</a>
</nav>

</header>


<section class="checkout-container">

<h1>Checkout</h1>

<form>

<div class="form-group">

<label>Full Name</label>
<input type="text" required>

</div>

<div class="form-group">

<label>Email</label>
<input type="email" required>

</div>

<div class="form-group">

<label>Shipping Address</label>
<input type="text" required>

</div>

<div class="form-group">

<label>State</label>

<select id="state" onchange="calculateTotal()">

<option value="TX">Texas</option>
<option value="CA">California</option>
<option value="NY">New York</option>
<option value="IL">Illinois</option>

</select>

</div>

<div class="form-group">

<label>Quantity</label>

<input type="number" id="quantity" value="1" min="1" onchange="calculateTotal()">

</div>

<div class="summary">

<h3>Order Summary</h3>

<p>Price per bar: $1.79</p>

<p>Subtotal: <span id="subtotal">$1.79</span></p>

<p>Tax: <span id="tax">$0.15</span></p>

<p class="total">Total: <span id="total">$1.94</span></p>

</div>

<br>

<button type="submit" class="cta">
Place Order
</button>

</form>

</section>

<script>
calculateTotal()
</script>

</body>
</html>
