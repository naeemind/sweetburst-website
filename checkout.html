<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SweetBurst Checkout</title>

<link rel="stylesheet" href="css/style.css">

<style>

.checkout-container{
max-width:600px;
margin:auto;
padding:40px;
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.summary{
margin-top:20px;
background:#fff4f2;
padding:20px;
border-radius:10px;
}

.total{
font-size:20px;
font-weight:bold;
color:#ff4d4d;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

.success{
display:none;
margin-top:20px;
background:#e6ffe6;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<header class="navbar">
<div class="logo">
    <img src="images/logo.png" alt="SweetBurst Logo" height="50">
</div>
</header>

<section class="checkout-container">

<h1>Checkout</h1>

<form id="checkoutForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Address</label>
<input type="text" id="address" required>
</div>

<div class="form-group">
<label>State</label>
<select id="state">
<option value="TX">Texas</option>
<option value="CA">California</option>
<option value="NY">New York</option>
<option value="IL">Illinois</option>
</select>
</div>

<div class="form-group">
<h3>Select Quantity by Flavor</h3>

<table border="1" width="100%" style="text-align:center">

<tr>
<th>Flavor</th>
<th>Price</th>
<th>Quantity</th>
</tr>

<tr>
<td>Strawberry Yogurt</td>
<td>$1.79</td>
<td>
<input type="number" id="strawberry" value="0" min="0" onchange="calculate()">
</td>
</tr>

<tr>
<td>Mango Yogurt</td>
<td>$1.79</td>
<td>
<input type="number" id="mango" value="0" min="0" onchange="calculate()">
</td>
</tr>

<tr>
<td>Blueberry Yogurt</td>
<td>$1.79</td>
<td>
<input type="number" id="blueberry" value="0" min="0" onchange="calculate()">
</td>
</tr>

</table>
</div>
<div class="summary">

<h3>Order Summary</h3>

<p>Total Units: <span id="units">0</span></p>

<p>Subtotal: <span id="subtotal">$0.00</span></p>

<p>Tax: <span id="tax">$0.00</span></p>

<p><b>Total: <span id="total">$0.00</span></b></p>

</div>


<br>

<button type="submit">Place Order</button>

</form>

<div class="success" id="successMessage">
✅ Order placed successfully!  
Thank you for supporting **Fuel a Student**.
</div>

</section>


<script>

const price = 1.79

const taxRates = {
TX:0.0825,
CA:0.0725,
NY:0.04,
IL:0.0625
}

function calculate(){

let strawberry = parseInt(document.getElementById("strawberry").value) || 0
let mango = parseInt(document.getElementById("mango").value) || 0
let blueberry = parseInt(document.getElementById("blueberry").value) || 0

let units = strawberry + mango + blueberry

let subtotal = units * price

let state = document.getElementById("state").value

let tax = subtotal * (taxRates[state] || 0)

let total = subtotal + tax

document.getElementById("units").innerText = units
document.getElementById("subtotal").innerText = "$" + subtotal.toFixed(2)
document.getElementById("tax").innerText = "$" + tax.toFixed(2)
document.getElementById("total").innerText = "$" + total.toFixed(2)

}

document.getElementById("strawberry").addEventListener("input",calculate)
document.getElementById("mango").addEventListener("input",calculate)
document.getElementById("blueberry").addEventListener("input",calculate)
document.getElementById("state").addEventListener("change",calculate)

document.getElementById("checkoutForm").addEventListener("submit", function(e){

e.preventDefault()

let strawberry = parseInt(document.getElementById("strawberry").value) || 0
let mango = parseInt(document.getElementById("mango").value) || 0
let blueberry = parseInt(document.getElementById("blueberry").value) || 0

let units = strawberry + mango + blueberry

if(units === 0){
alert("Please select at least one bar.")
return
}

let subtotal = units * price
let state = document.getElementById("state").value
let tax = subtotal * (taxRates[state] || 0)
let total = subtotal + tax

window.location.href =
`summary.html?strawberry=${strawberry}&mango=${mango}&blueberry=${blueberry}&subtotal=${subtotal.toFixed(2)}&tax=${tax.toFixed(2)}&total=${total.toFixed(2)}`

})

calculate()

</script>
</body>
</html>
